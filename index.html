<!doctype html>
<html
    lang="en"
    class="scroll-smooth [&::-webkit-scrollbar]:w-3 [&::-webkit-scrollbar-track]:bg-[#f4f4f0] dark:[&::-webkit-scrollbar-track]:bg-[#0a0a0a] [&::-webkit-scrollbar-track]:border-l-2 [&::-webkit-scrollbar-track]:border-black dark:[&::-webkit-scrollbar-track]:border-white [&::-webkit-scrollbar-thumb]:bg-black dark:[&::-webkit-scrollbar-thumb]:bg-white [&::-webkit-scrollbar-thumb]:border-2 [&::-webkit-scrollbar-thumb]:border-[#f4f4f0] dark:[&::-webkit-scrollbar-thumb]:border-[#0a0a0a]"
>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="A brutalist, high-performance offline manga viewer." />
        <title>Manga Viewer</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- Swapping boring fonts for high-fashion / technical brutalist typography -->
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
            rel="stylesheet"
        />
        <!-- Vite injects CSS here -->
    </head>
    <body
        class="bg-[#f4f4f0] dark:bg-[#0a0a0a] text-black dark:text-white font-sans transition-colors duration-300 overflow-y-scroll selection:bg-[#FF3366] selection:text-white"
    >
        <!-- Persistent SVG Noise Overlay for that printed manga/paper texture -->
        <svg
            class="pointer-events-none fixed inset-0 z-[999] h-full w-full opacity-[0.04] dark:opacity-[0.06] mix-blend-multiply dark:mix-blend-overlay"
        >
            <filter id="noise">
                <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
            </filter>
            <rect width="100%" height="100%" filter="url(#noise)" />
        </svg>

        <!-- Background Halftone Grid (Subtle) -->
        <div
            class="fixed inset-0 z-[-1] pointer-events-none bg-[radial-gradient(#d1d1d1_1px,transparent_1px)] dark:bg-[radial-gradient(#333_1px,transparent_1px)] [background-size:20px_20px] opacity-50"
        ></div>

        <!-- Main Application Container -->
        <div id="app" class="flex flex-col min-h-screen relative font-space">
            <!-- Brutalist Toggle Container -->
            <div id="sidebar-toggle-container" class="fixed top-4 left-4 z-50 mix-blend-difference text-white"></div>

            <!-- Password Prompt -->
            <div
                id="password-modal"
                class="fixed inset-0 z-[100] hidden items-center justify-center bg-[#f4f4f0]/95 dark:bg-[#0a0a0a]/95 backdrop-blur-md"
            >
                <!-- PasswordPrompt.js will populate this -->
            </div>

            <!-- Loading Spinner (Redesigned as a geometric pulsing block instead of a boring spinner) -->
            <div
                id="loading-spinner"
                class="fixed inset-0 z-[90] hidden items-center justify-center bg-[#f4f4f0]/80 dark:bg-[#0a0a0a]/80 backdrop-blur-sm"
            >
                <div
                    class="relative w-16 h-16 border-4 border-black dark:border-white shadow-[8px_8px_0_0_#FF3366] animate-[spin_2s_steps(4)_infinite]"
                >
                    <div class="absolute inset-2 bg-black dark:bg-white animate-pulse"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <aside
                id="sidebar"
                class="fixed top-0 left-0 h-full w-0 bg-[#f4f4f0] dark:bg-[#0a0a0a] border-r-4 border-black dark:border-white z-40 transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)] flex flex-col items-center py-6 overflow-y-auto no-scrollbar shadow-[12px_0_0_0_rgba(0,0,0,1)] dark:shadow-[12px_0_0_0_#FF3366]"
            >
                <!-- SidebarManager.js will populate this -->
            </aside>

            <!-- Main Content Area -->
            <div id="main-content" class="flex-grow transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)] ml-0">
                <!-- Homepage View -->
                <div id="homepage-container" class="container mx-auto px-6 py-12 hidden">
                    <!-- HomePageUI.js will populate this -->
                </div>

                <!-- Viewer View -->
                <div id="viewer-container" class="hidden flex-col items-center relative">
                    <!-- Progress Bar (Sharp, vivid, solid lines) -->
                    <div
                        id="progress-bar"
                        class="fixed left-0 w-full z-50 overflow-visible h-2 origin-bottom transition-transform duration-200 ease-out before:content-[''] before:absolute before:left-0 before:right-0 before:-top-4 before:-bottom-4 before:-z-10 group"
                    ></div>

                    <!-- Image Container -->
                    <main
                        id="image-container"
                        class="w-full px-2 sm:px-8 py-8 flex flex-col items-center bg-transparent relative z-10"
                    ></main>

                    <!-- Navigation Bar -->
                    <nav
                        id="nav-container"
                        class="fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 bg-[#f4f4f0] dark:bg-[#0a0a0a] border-2 border-black dark:border-white shadow-[6px_6px_0_0_#000] dark:shadow-[6px_6px_0_0_#FF3366] z-30 flex items-center space-x-4 opacity-0 transform -translate-y-[150%] transition-all duration-300 ease-[cubic-bezier(0.175,0.885,0.32,1.275)]"
                    >
                        <!-- NavigationManager.js will populate this -->
                    </nav>

                    <!-- Scrubber Icon -->
                    <div
                        id="scrubber-icon"
                        class="fixed right-6 top-6 z-[25] p-3 border-2 border-black dark:border-white bg-[#f4f4f0] dark:bg-[#0a0a0a] shadow-[4px_4px_0_0_#FF3366] text-black dark:text-white pointer-events-none cursor-pointer transition-all duration-300 opacity-50 hover:opacity-100 hover:-translate-y-1 hover:translate-x-1 hover:shadow-[0_0_0_0_#FF3366]"
                    >
                        <!-- ScrubberManager.js adds icon -->
                    </div>

                    <!-- Scrubber Track -->
                    <div
                        id="scrubber-parent"
                        class="fixed right-0 top-0 h-full z-20 flex items-center pointer-events-none opacity-0 transition-opacity duration-300"
                    >
                        <div
                            id="scrubber-container"
                            class="h-full flex items-center bg-transparent pl-8 pr-6 pointer-events-none border-l-2 border-transparent dark:border-transparent"
                        >
                            <!-- Preview Area -->
                            <div
                                id="scrubber-preview"
                                class="h-full overflow-hidden relative mr-6 pointer-events-none drop-shadow-[8px_8px_0_rgba(0,0,0,1)] dark:drop-shadow-[8px_8px_0_#FF3366]"
                            >
                                <div
                                    class="flex flex-col items-end space-y-4 py-8 transform transition-transform duration-75 ease-linear p-2"
                                >
                                    <!-- ScrubberManager.js adds preview images -->
                                </div>
                            </div>

                            <!-- Scrubber Track/Handle Area -->
                            <div
                                id="scrubber"
                                class="relative h-full w-12 lg:w-16 pointer-events-auto cursor-grab active:cursor-grabbing border-l-4 border-black/10 dark:border-white/10 hover:border-black dark:hover:border-[#FF3366] transition-colors"
                            >
                                <div
                                    id="scrubber-hitbox-extension"
                                    class="absolute top-0 bottom-0 -left-12 w-12 h-full pointer-events-auto cursor-grab active:cursor-grabbing"
                                ></div>

                                <!-- Active Marker (Brutalist Flag) -->
                                <div
                                    id="scrubber-marker-active"
                                    class="absolute -left-2 w-[calc(100%+16px)] h-10 bg-[#FF3366] border-2 border-black dark:border-white shadow-[4px_4px_0_0_#000] dark:shadow-[4px_4px_0_0_#fff] text-white text-sm font-bold flex items-center justify-center pointer-events-none transform transition-transform duration-75 ease-linear z-10"
                                ></div>

                                <!-- Hover/Drag Marker -->
                                <div
                                    id="scrubber-marker"
                                    class="absolute -left-2 w-[calc(100%+16px)] h-10 bg-[#f4f4f0] dark:bg-[#0a0a0a] border-2 border-black dark:border-white text-black dark:text-white text-sm font-bold flex items-center justify-center pointer-events-none transform opacity-0 transition-opacity duration-150 z-0"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modals Container -->
            <div id="modal-container"></div>

            <!-- Lightbox -->
            <div
                id="lightbox"
                class="fixed inset-0 z-[70] hidden items-center justify-center bg-[#f4f4f0]/95 dark:bg-[#0a0a0a]/95 backdrop-blur-lg cursor-zoom-out"
            >
                <!-- Lightbox.js will populate this -->
            </div>
        </div>

        <script type="module" src="/src/js/main.js"></script>
    </body>
</html>
